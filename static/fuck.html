<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBank Pro - Next-Gen Fintech & Crypto Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        // Custom Brand Color Palette (Deep Blue/Purple)
                        brand: {
                            50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 
                            400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 
                            800: '#5b21b6', 900: '#4c1d95', 950: '#2c0f5b',
                        },
                        // Dark mode background colors
                        'dark-bg': '#0c0a1a', 
                        'dark-card': '#141128', 
                        'dark-border': '#272242',
                    },
                },
            },
        }
    </script>
    <style>
        /* General Styles */
        body {
            background-color: #0c0a1a; /* dark-bg */
            color: #f3f4f6; /* Light gray text */
            transition: background-color 0.3s;
        }

        /* Glassmorphism Effect for Cards/Inputs */
        .glass-card {
            background-color: rgba(20, 17, 40, 0.7); /* dark-card with transparency */
            border: 1px solid rgba(139, 92, 246, 0.2); /* brand-500 light border */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2), 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        .glass-input {
            background-color: rgba(25, 25, 50, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e0e7ff;
        }
        .glass-input:focus {
            border-color: #a78bfa; /* brand-400 */
            outline: none;
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.5);
        }
        
        /* Custom Scrollbar for better dark mode aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1b3a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6d28d9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }

        /* Chart Tooltip Styling */
        .chartjs-tooltip {
            background: #141128;
            border: 1px solid #6d28d9;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
    </style>
</head>

<body class="font-sans min-h-screen antialiased overflow-x-hidden">

    <div id="loading-overlay" class="fixed inset-0 bg-dark-bg/90 backdrop-blur-sm flex items-center justify-center z-[100] transition-opacity duration-300 hidden">
        <div class="flex flex-col items-center">
            <i class="ph-spinner-gap ph-2xl animate-spin text-brand-500"></i>
            <p class="mt-4 text-brand-300 text-lg font-medium">Processing your request...</p>
        </div>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3">
        </div>

    <div id="app-container" class="min-h-screen flex">
        </div>

    <div id="auth-modal" class="fixed inset-0 bg-dark-bg/90 backdrop-blur-xl flex items-center justify-center z-50 hidden">
        </div>
    
    <div id="generic-modal" class="hidden fixed inset-0 bg-dark-bg/80 backdrop-blur-sm z-40 items-center justify-center">
        <div id="modal-content" class="w-full max-w-lg glass-card rounded-2xl p-6 transform transition-all duration-300 scale-95 opacity-0">
            </div>
    </div>

    <script>
        // --- Configuration & State Management ---
        const BASE_API_URL = '/api'; // Standard API base URL
        const Store = {
            isAuthenticated: false,
            isAdmin: false,
            user: {},
            accounts: { fiat: 0, crypto: {} },
            marketData: [], // Stores live crypto market data
            transactions: [],
            config: {}, // Admin config
            activeView: '',
            authToken: localStorage.getItem('authToken'), // Initial check for token
        };

        const Views = {
            'dashboard': { icon: 'ph-house-fill', name: 'Dashboard' },
            'banking': { icon: 'ph-bank-fill', name: 'Banking' },
            'crypto': { icon: 'ph-currency-btc-fill', name: 'Crypto Exchange' },
            'wallet': { icon: 'ph-wallet-fill', name: 'Wallet' },
            'cards': { icon: 'ph-credit-card-fill', name: 'Cards' },
            'settings': { icon: 'ph-gear-six-fill', name: 'Settings' },
            'loans': { icon: 'ph-coins-fill', name: 'Loans' },
            'admin': { icon: 'ph-crown-fill', name: 'Admin Panel', adminOnly: true },
        };

        // --- Utility Functions ---

        /** Shows a toast notification */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const colorMap = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-brand-500'
            };
            const iconMap = {
                success: 'ph-check-circle-fill',
                error: 'ph-x-circle-fill',
                info: 'ph-info-fill'
            };

            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-lg text-white ${colorMap[type]} flex items-center space-x-3 transition-all duration-300 transform translate-x-full opacity-0`;
            toast.innerHTML = `<i class="${iconMap[type]} text-xl"></i><span>${message}</span>`;
            
            container.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);

            // Animate out and remove
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        /** Formats a number to currency */
        function formatCurrency(amount, currency = 'USD') {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }

        /** Formats a number to crypto display */
        function formatCrypto(amount, symbol) {
            return `${new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 8 }).format(amount)} ${symbol}`;
        }

        /** Shows/Hides the generic modal */
        function toggleModal(isVisible, contentHTML = '', title = 'Action Required') {
            const modal = document.getElementById('generic-modal');
            const modalContent = document.getElementById('modal-content');
            
            if (isVisible) {
                modalContent.innerHTML = `
                    <div class="pb-4 border-b border-dark-border mb-4 flex justify-between items-center">
                        <h3 class="text-2xl font-bold text-white">${title}</h3>
                        <button onclick="toggleModal(false)" class="text-brand-300 hover:text-brand-500"><i class="ph-x text-2xl"></i></button>
                    </div>
                    ${contentHTML}
                `;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    modalContent.innerHTML = '';
                }, 300);
            }
        }

        /** Shows/Hides the loading overlay */
        function toggleLoading(isVisible) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !isVisible);
        }

        // --- API Interaction Layer ---

        /** Generic API fetch wrapper */
        async function apiCall(endpoint, options = {}) {
            toggleLoading(true);
            const headers = {
                'Content-Type': 'application/json',
                ...(Store.authToken && { 'Authorization': `Bearer ${Store.authToken}` })
            };

            try {
                const response = await fetch(`${BASE_API_URL}${endpoint}`, {
                    ...options,
                    headers: { ...headers, ...options.headers }
                });

                toggleLoading(false);

                if (response.status === 401) {
                    // Unauthorized/Token expired
                    handleLogout();
                    showToast("Session expired. Please log in again.", 'error');
                    return null;
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: `Server error: ${response.statusText}` }));
                    throw new Error(errorData.message || `API Error: ${response.status}`);
                }

                return await response.json();

            } catch (error) {
                toggleLoading(false);
                showToast(error.message || "An unknown network error occurred.", 'error');
                console.error("API Call Error:", error);
                return null;
            }
        }

        /** Initial Data Fetch: User, Accounts, Market */
        async function fetchInitialData() {
            if (!Store.isAuthenticated) return;

            const [profile, transactions, market] = await Promise.all([
                apiCall('/user/profile'), // New endpoint: GET /api/user/profile
                apiCall('/transactions'), // Existing endpoint: GET /api/transactions
                apiCall('/crypto/market'), // Existing endpoint: GET /api/crypto/market
            ]);

            if (profile) {
                Store.user = profile.user || {};
                Store.accounts = profile.accounts || { fiat: 0, crypto: {} };
                Store.isAdmin = Store.user.role === 'admin';
                Store.user.loans = profile.loans || null; // User loan info
                Store.user.cards = profile.cards || []; // User card info
                
                
            }
            if (transactions) {
                Store.transactions = transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
            if (market) {
                Store.marketData = market;
            }
            
            // Re-render the app with fresh data
            renderApp();
        }

        // --- Authentication Logic ---

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showToast("Please enter email and password.", 'info');

            apiCall('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            }).then(data => {
                if (data && data.token) {
                    Store.authToken = data.token;
                    localStorage.setItem('authToken', data.token);
                    Store.isAuthenticated = true;
                    // Initial data fetch and UI setup
                    fetchInitialData();
                    document.getElementById('auth-modal').classList.add('hidden');
                    showToast("Login Successful! Welcome back.", 'success');
                    window.location.hash = '#dashboard';
                }
            });
        }

        function handleRegister() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            if (!name || !email || !password) return showToast("Please fill all fields.", 'info');

            apiCall('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password })
            }).then(data => {
                if (data && data.token) {
                    // Registration typically logs you in immediately
                    Store.authToken = data.token;
                    localStorage.setItem('authToken', data.token);
                    Store.isAuthenticated = true;
                    fetchInitialData();
                    document.getElementById('auth-modal').classList.add('hidden');
                    showToast("Registration Successful! Welcome to QuantumBank.", 'success');
                    window.location.hash = '#dashboard';
                }
            });
        }

        function handleLogout() {
            // We assume a simple token removal is enough, although a backend call to invalidate is better
            Store.authToken = null;
            Store.isAuthenticated = false;
            localStorage.removeItem('authToken');
            Store.user = {};
            Store.accounts = { fiat: 0, crypto: {} };
            showToast("You have been logged out.", 'info');
            renderApp();
        }

        // --- Rendering Functions: Views ---

        function renderAuthPage(isLogin = true) {
            const modal = document.getElementById('auth-modal');
            const authContent = isLogin 
                ? `
                <div class="glass-card p-8 md:p-12 w-full max-w-md rounded-3xl shadow-2xl">
                    <h2 class="text-4xl font-extrabold text-white mb-2 text-center">Welcome Back</h2>
                    <p class="text-brand-300 mb-8 text-center">Sign in to access your digital assets.</p>

                    <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-5">
                        <input id="login-email" type="email" placeholder="Email Address" required class="w-full glass-input rounded-xl px-5 py-3 text-sm transition focus:ring-2 focus:ring-brand-500">
                        <input id="login-password" type="password" placeholder="Password" required class="w-full glass-input rounded-xl px-5 py-3 text-sm transition focus:ring-2 focus:ring-brand-500">
                        
                        <div class="flex justify-between items-center text-sm">
                            <label class="flex items-center text-brand-200 cursor-pointer">
                                <input type="checkbox" class="h-4 w-4 text-brand-600 bg-transparent border-brand-500 rounded focus:ring-brand-500">
                                <span class="ml-2">Remember Me</span>
                            </label>
                            <a href="#" class="text-brand-400 hover:text-brand-300 font-medium">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl text-lg transition duration-300 shadow-lg shadow-brand-500/30">
                            Login
                        </button>
                    </form>
                    <p class="mt-8 text-center text-sm text-brand-200">
                        Don't have an account? 
                        <a href="#" onclick="renderAuthPage(false)" class="text-brand-400 font-bold hover:text-brand-300">Register Now</a>
                    </p>
                </div>
                `
                : `
                <div class="glass-card p-8 md:p-12 w-full max-w-md rounded-3xl shadow-2xl">
                    <h2 class="text-4xl font-extrabold text-white mb-2 text-center">Join QuantumBank</h2>
                    <p class="text-brand-300 mb-8 text-center">Create your account in seconds.</p>

                    <form onsubmit="event.preventDefault(); handleRegister();" class="space-y-5">
                        <input id="register-name" type="text" placeholder="Full Name" required class="w-full glass-input rounded-xl px-5 py-3 text-sm transition focus:ring-2 focus:ring-brand-500">
                        <input id="register-email" type="email" placeholder="Email Address" required class="w-full glass-input rounded-xl px-5 py-3 text-sm transition focus:ring-2 focus:ring-brand-500">
                        <input id="register-password" type="password" placeholder="Password (min 8 chars)" required class="w-full glass-input rounded-xl px-5 py-3 text-sm transition focus:ring-2 focus:ring-brand-500">
                        
                        <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl text-lg transition duration-300 shadow-lg shadow-green-500/30">
                            Register Account
                        </button>
                    </form>
                    <p class="mt-8 text-center text-sm text-brand-200">
                        Already have an account? 
                        <a href="#" onclick="renderAuthPage(true)" class="text-brand-400 font-bold hover:text-brand-300">Sign In</a>
                    </p>
                </div>
                `;
            
            modal.innerHTML = authContent;
            modal.classList.remove('hidden');
        }

        // --- View Rendering Logic ---

        function renderSidebar() {
            let navItems = '';
            for (const key in Views) {
                const view = Views[key];
                // Skip if not admin and view is admin-only
                if (view.adminOnly && !Store.isAdmin) continue;

                const isActive = Store.activeView === key;
                navItems += `
                    <a href="#${key}" 
                       class="flex items-center space-x-3 p-3 rounded-xl transition duration-200 ${isActive ? 'bg-brand-600 text-white shadow-lg shadow-brand-500/50' : 'text-brand-300 hover:bg-dark-card hover:text-brand-100'}">
                        <i class="${view.icon} text-xl"></i>
                        <span class="font-medium">${view.name}</span>
                    </a>
                `;
            }

            return `
                <aside class="w-64 bg-dark-card p-5 sticky top-0 h-screen border-r border-dark-border flex flex-col z-20">
                    <div class="flex items-center space-x-2 pb-6 mb-6 border-b border-dark-border">
                        <i class="ph-bank ph-2xl text-brand-500"></i>
                        <span class="text-2xl font-extrabold text-white">Quantum<span class="text-brand-400">Bank</span></span>
                    </div>

                    <nav class="flex-grow space-y-2">
                        ${navItems}
                    </nav>

                    <div class="pt-6 mt-6 border-t border-dark-border">
                        <div class="flex items-center space-x-3 mb-4 p-3 rounded-xl glass-card">
                            <div class="w-10 h-10 bg-brand-700 rounded-full flex items-center justify-center text-white font-bold text-sm">
                                ${Store.user.name ? Store.user.name[0] : 'U'}
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-white truncate max-w-[120px]">${Store.user.name || 'User'}</p>
                                <p class="text-xs text-brand-300">${Store.user.role || 'Client'}</p>
                            </div>
                        </div>
                        <button onclick="handleLogout()" class="w-full flex items-center justify-center space-x-2 py-2 bg-red-700 hover:bg-red-600 text-white font-medium rounded-xl transition duration-200">
                            <i class="ph-sign-out text-lg"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </aside>
            `;
        }

        function renderHeader() {
            const viewTitle = Views[Store.activeView] ? Views[Store.activeView].name : 'Dashboard';
            return `
                <header class="sticky top-0 bg-dark-bg/90 backdrop-blur-md p-5 border-b border-dark-border z-10">
                    <div class="flex justify-between items-center">
                        <h1 class="text-3xl font-bold text-white">${viewTitle}</h1>
                        <div class="flex items-center space-x-4">
                            <button class="p-3 glass-card rounded-full hover:bg-dark-card/50 text-brand-400 transition"><i class="ph-bell text-xl"></i></button>
                            <button class="p-3 glass-card rounded-full hover:bg-dark-card/50 text-brand-400 transition"><i class="ph-question-fill text-xl"></i></button>
                            <div class="w-10 h-10 bg-brand-600 rounded-full"></div> </div>
                    </div>
                </header>
            `;
        }

        function renderDashboard() {
            const fiatBalance = Store.accounts.fiat || 0;
            const cryptoPortfolioValue = Object.keys(Store.accounts.crypto).reduce((sum, symbol) => {
                const marketItem = Store.marketData.find(m => m.symbol === symbol);
                const price = marketItem ? marketItem.price : 0;
                return sum + (Store.accounts.crypto[symbol] * price);
            }, 0);
            const totalAssets = fiatBalance + cryptoPortfolioValue;

            const recentTransactions = Store.transactions.slice(0, 5).map(t => `
                <div class="flex justify-between items-center py-3 border-b border-dark-border last:border-b-0">
                    <div class="flex items-center space-x-3">
                        <i class="ph-arrow-${t.type === 'DEPOSIT' || t.type === 'BUY' ? 'up-right' : 'down-left'} text-2xl ${t.type === 'DEPOSIT' || t.type === 'BUY' ? 'text-green-400' : 'text-red-400'}"></i>
                        <div>
                            <p class="text-white font-medium">${t.description || t.type}</p>
                            <p class="text-xs text-brand-300">${moment(t.date).fromNow()}</p>
                        </div>
                    </div>
                    <span class="font-mono text-white ${t.type === 'DEPOSIT' || t.type === 'BUY' ? 'text-green-400' : 'text-red-400'}">${formatCurrency(t.amount, t.currency)}</span>
                </div>
            `).join('');

            return `
                <div class="space-y-6 p-6">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-2 glass-card p-6 rounded-2xl flex flex-col justify-between">
                            <i class="ph-wallet text-3xl text-brand-500 mb-2"></i>
                            <p class="text-brand-300 font-semibold uppercase text-sm">Total Portfolio Value</p>
                            <h2 class="text-5xl font-extrabold text-white mt-1">${formatCurrency(totalAssets)}</h2>
                            <div class="flex items-center space-x-2 mt-3">
                                <span class="text-green-400 font-medium flex items-center"><i class="ph-arrow-up text-lg"></i> +4.5%</span>
                                <span class="text-sm text-brand-300">vs last month</span>
                            </div>
                        </div>

                        <div class="glass-card p-6 rounded-2xl">
                            <i class="ph-bank text-3xl text-green-500 mb-2"></i>
                            <p class="text-brand-300 font-semibold uppercase text-sm">Fiat Balance (USD)</p>
                            <h3 class="text-3xl font-bold text-white mt-1 font-mono">${formatCurrency(fiatBalance)}</h3>
                            <button onclick="window.location.hash='#banking'" class="mt-4 text-brand-400 hover:text-brand-300 text-sm font-medium flex items-center">
                                Deposit/Withdraw <i class="ph-arrow-right ml-1"></i>
                            </button>
                        </div>

                        <div class="glass-card p-6 rounded-2xl">
                            <i class="ph-currency-btc text-3xl text-yellow-500 mb-2"></i>
                            <p class="text-brand-300 font-semibold uppercase text-sm">Crypto Portfolio Value</p>
                            <h3 class="text-3xl font-bold text-white mt-1 font-mono">${formatCurrency(cryptoPortfolioValue)}</h3>
                            <button onclick="window.location.hash='#crypto'" class="mt-4 text-brand-400 hover:text-brand-300 text-sm font-medium flex items-center">
                                Trade Now <i class="ph-arrow-right ml-1"></i>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        <div class="lg:col-span-2 glass-card p-6 rounded-2xl">
                            <h3 class="text-xl font-bold text-white mb-4">7-Day Portfolio Performance</h3>
                            <div style="height: 300px;">
                                <canvas id="portfolioChart"></canvas>
                            </div>
                        </div>

                        <div class="glass-card p-6 rounded-2xl h-full flex flex-col">
                            <h3 class="text-xl font-bold text-white mb-4">Recent Activity</h3>
                            <div class="flex-grow space-y-1 overflow-y-auto">
                                ${recentTransactions.length > 0 ? recentTransactions : '<p class="text-brand-300 text-sm italic">No recent transactions.</p>'}
                            </div>
                            <button onclick="window.location.hash='#transactions'" class="mt-4 w-full py-2 text-brand-400 hover:bg-dark-border rounded-lg transition">View All</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Render: Banking (Fiat Transfers) ---
        function renderBanking() {
            return `
                <div class="space-y-6 p-6">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-1 glass-card p-6 rounded-2xl">
                            <h3 class="text-xl font-bold text-white mb-4">Your Fiat Account</h3>
                            <p class="text-brand-300 uppercase text-sm">Available Balance</p>
                            <p class="text-4xl font-mono font-bold text-green-400 mt-1">${formatCurrency(Store.accounts.fiat)}</p>
                            <p class="text-sm text-brand-300 mt-4">Account Number: **${Store.user.account_number || 'N/A'}**</p>
                            <p class="text-sm text-brand-300">Routing Number: 987654321</p>
                        </div>

                        <div class="lg:col-span-2 glass-card p-6 rounded-2xl">
                            <h3 class="text-xl font-bold text-white mb-4 border-b border-dark-border pb-3">Send Money (P2P/Bank Transfer)</h3>
                            <form onsubmit="event.preventDefault(); handleFiatTransfer();" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-brand-200 mb-1">Recipient Account/Email</label>
                                    <input id="transfer-recipient" type="text" placeholder="QuantumBank Email or Account Number" required class="w-full glass-input rounded-xl px-4 py-3 text-sm font-mono">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>

        // Function to handle crypto trading
        function handleCryptoTrade() {
            const type = document.getElementById('trade-type').value; // BUY or SELL
            const symbol = document.getElementById('trade-pair').value;
            const amount = parseFloat(document.getElementById('trade-amount').value);
            const price = Store.marketData.find(m => m.symbol === symbol)?.price;
            
            if (isNaN(amount) || amount <= 0 || !price) {
                return showToast("Invalid trade amount or symbol.", 'error');

            const totalCost = amount * price * 1.005; // Amount * Price * (1 + Fee)

            if (type === 'BUY' && totalCost > Store.accounts.fiat) {
                return showToast("Insufficient fiat balance for this purchase.", 'error');
            }
            if (type === 'SELL' && amount > (Store.accounts.crypto[symbol] || 0)) {
                return showToast(`Insufficient ${symbol} balance for this sale.`, 'error');
            }

            // Endpoint: POST /api/crypto/trade
            apiCall('/crypto/trade', {
                method: 'POST',
                body: JSON.stringify({ 
                    action: type.toLowerCase(), 
                    symbol, 
                    amount, 
                    price // Note: Backend should validate this is close to market price
                })
            }).then(data => {
                if (data) {
                    showToast(`${type} of ${formatCrypto(amount, symbol)} successful!`, 'success');

                    fetchInitialData(); 
                    document.getElementById('trade-amount').value = '';

    const rate = 0.045 / 12; // 4.5% monthly
    
    if (amount > 0) {
        const monthly = (amount * rate) / (1 - Math.pow(1 + rate, -months));
        const total = monthly * months;
        document.getElementById('preview-payment').innerText = formatCurrency(monthly);
        document.getElementById('preview-total').innerText = formatCurrency(total);
    }
}

function calculateLoanPreview() {
    const amount = parseFloat(document.getElementById('loan-amount').value) || 0;
    const months = parseInt(document.getElementById('loan-duration').value);
    const rate = 0.045 / 12; // 4.5% monthly
    
    if (amount > 0) {
        const monthly = (amount * rate) / (1 - Math.pow(1 + rate, -months));
        const total = monthly * months;
        document.getElementById('preview-payment').innerText = formatCurrency(monthly);
        document.getElementById('preview-total').innerText = formatCurrency(total);
    }
}

            // 2. Get main-content reference again
            const newMainContent = document.getElementById('main-content');
            newMainContent.innerHTML = '<div class="p-6 text-center text-brand-300"><i class="ph-spinner-gap ph-2xl animate-spin"></i> Loading...</div>';

            // 3. Render specific view
            let content = '';
            switch (viewKey) {
                case 'dashboard':
                    content = renderDashboard();
                    break;
                case 'banking':
                    content = renderBanking();
                    break;
                case 'crypto':
                    content = renderCrypto();
                    break;
                case 'wallet':
                    content = renderWallet();
                    break;
                case 'cards':
                    content = renderCards();
                    break;
                case 'settings':
                    content = renderSettings();
                    break;
                case 'admin':
                    content = await renderAdmin(); // Admin view is async
                    break;
                case 'loans':
                    content = renderLoans();
                    break;
                default:
                    content = renderDashboard(); // Fallback
                    Store.activeView = 'dashboard';
            }
            newMainContent.innerHTML = content;

            // 4. Post-render logic (e.g., charts)
            if (viewKey === 'dashboard') {
                // Mock chart data setup
                const ctx = document.getElementById('portfolioChart')?.getContext('2d');
                if (ctx) {
                    const mockData = {
                        labels: ['Dec 1', 'Dec 2', 'Dec 3', 'Dec 4', 'Dec 5', 'Dec 6', 'Dec 7'],
                        datasets: [{
                            label: 'Portfolio Value (USD)',
                            data: [15000, 15500, 14900, 16000, 16200, 17000, Store.accounts.fiat + (Object.keys(Store.accounts.crypto).length > 0 ? 1000 : 0) + 10000],
                            borderColor: '#8b5cf6', // brand-500
                            backgroundColor: 'rgba(139, 92, 246, 0.2)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3
                        }]
                    };

                    new Chart(ctx, {
                        type: 'line',
                        data: mockData,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    callbacks: {
                                        label: (context) => formatCurrency(context.parsed.y)
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: 'rgba(40, 40, 70, 0.5)' },
                                    ticks: { color: '#c4b5fd' }
                                },
                                y: {
                                    grid: { color: 'rgba(40, 40, 70, 0.5)' },
                                    ticks: { 
                                        color: '#c4b5fd',
                                        callback: (value) => formatCurrency(value, '') // Remove USD symbol from Y-axis
                                    }
                                }
                            }
                        }
                    });
                }
            }
        }

        function router() {
            const hash = window.location.hash.substring(1);
            
            // 1. If not authenticated and no hash (or just entered site), show Landing Page
            if (!Store.isAuthenticated) {
                if (!hash || hash === 'landing') {
                    renderLandingPage();
                    return;
                } else {
                    // If they try to go to #dashboard without auth, show login modal
                    renderLandingPage();
                    return;
                }
            }

            // 2. If Authenticated
            let view = hash.split('?')[0] || 'dashboard';

            // Admin Protection
            if (Views[view]?.adminOnly && !Store.isAdmin) {
                showToast("Access Restricted", 'error');
                view = 'dashboard'; 
            }
            
            // Default fallback
            if (!Views[view]) view = 'dashboard';

            Store.activeView = view;
            renderView(view);
        }

        function init() {
            if (Store.authToken) {
                Store.isAuthenticated = true;
                fetchInitialData().then(() => {
                    if(!window.location.hash) window.location.hash = '#dashboard';
                    router(); 
                });
            } else {
                Store.isAuthenticated = false;
                // Check if there is a hash, if not render Landing
                if(!window.location.hash) {
                    renderLandingPage();
                } else {
                    router(); // Triggers renderAuthPage
                }
            }

            window.addEventListener('hashchange', router);
        }

        
        // Centralized render function called after auth/data fetch
        function renderApp() {
            const authModal = document.getElementById('auth-modal');
            if (Store.isAuthenticated) {
                authModal.classList.add('hidden');
                router();
            } else {
                router();
                //document.getElementById('app-container').innerHTML = ''; // Clear main app content
            }
        }

        // Run initialization
        init();

    </script>


    <!-- a good looking landing page with sign in and login buttons and other sections.  -->
    

</body>
</html>
